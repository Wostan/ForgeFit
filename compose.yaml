services:
  forgefit.api:
    image: forgefit.api
    build:
      context: .
      dockerfile: src/ForgeFit.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=forgefit-db,1433;Database=ForgeFitDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
      - JwtSettings__Secret=${JWT_SECRET}
      - FoodApiSettings__ClientId=${FATSECRET_CLIENT_ID}
      - FoodApiSettings__ClientSecret=${FATSECRET_CLIENT_SECRET}
    depends_on:
      - forgefit-db

  forgefit-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: forgefit-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

volumes:
  sqldata: